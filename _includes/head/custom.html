<style>
  /* Strip out all text properties and force pure blue colors */
  .masthead__inner-wrap .greedy-nav .site-title a,
  .greedy-nav .site-title a {
    color: #0000ff !important;
    -webkit-text-fill-color: #0000ff !important; /* Forces color on webkit/safari engines */
    opacity: 1 !important;                       /* Prevents the text from being partially transparent */
    filter: none !important;                    /* Removes any underlying color-shifting filters */
    
    /* SANITY TEST: Adds a bright red box around the title link */
    border: 3px solid red !important; 
  }

  /* Force pure green on hover */
  .masthead__inner-wrap .greedy-nav .site-title a:hover,
  .greedy-nav .site-title a:hover {
    color: #00ff00 !important;
    -webkit-text-fill-color: #00ff00 !important;
    opacity: 1 !important;
    filter: none !important;
  }
</style>
